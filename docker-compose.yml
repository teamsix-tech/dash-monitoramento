networks:
  monitor-net:
    name: monitor-net
  traefik_public:
    external: true

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  prometheus:
    image: prom/prometheus:v2.17.1
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - monitor-net
    labels:
      org.label-schema.group: "monitoring"

  alertmanager:
    image: prom/alertmanager:v0.20.0
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/config.yml
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - monitor-net
    labels:
      org.label-schema.group: "monitoring"

  nodeexporter:
    image: prom/node-exporter:v0.18.1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
    networks:
      - monitor-net
    labels:
      org.label-schema.group: "monitoring"

  cadvisor:
    image: ghcr.io/google/cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
    networks:
      - monitor-net
    labels:
      org.label-schema.group: "monitoring"

  grafana:
    image: grafana/grafana:10.4.2
    volumes:
      - grafana_data:/var/lib/grafana
      # - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - 3000:3000
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.monitoring.rule=Host(`monitoring-hml.teamsix.tech`)
        - traefik.http.routers.monitoring.service=monitoring
        - traefik.http.routers.monitoring.entrypoints=websecure
        - traefik.http.routers.monitoring.tls.certresolver=le
        - traefik.http.routers.monitoring.tls=true
        - traefik.http.services.monitoring.loadbalancer.server.port=3000
    labels:
      - org.label-schema.group="monitoring"
    networks:
      - traefik_public
      - monitor-net

  pushgateway:
    image: prom/pushgateway:v1.2.0
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - monitor-net
    labels:
      org.label-schema.group: "monitoring"

  loki:
    image: grafana/loki:2.9.2
    command: -config.file=/etc/loki/loki-config.yml
    configs:
      - source: loki_config
        target: /etc/loki/loki-config.yml
    networks:
      - monitor-net
    deploy:
      replicas: 1
      mode: replicated

  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    configs:
      - source: promtail_config
        target: /etc/promtail/promtail-config.yml
    networks:
      - monitor-net
    deploy:
      mode: global

configs:
  loki_config:
    external: true
  promtail_config:
    external: true
  prometheus_config:
    external: true
  alertmanager_config:
    external: true
